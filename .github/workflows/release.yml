name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish crates and push the version bump commit
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build and test release candidate
        run: cargo test --workspace --all-features --locked --verbose

      - name: Build docs with docs.rs flags
        env:
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"
        run: cargo doc --workspace --all-features --no-deps --locked

      - name: Bump workspace minor version
        id: bump
        run: |
          chmod +x scripts/bump-workspace-minor.sh
          next_version="$(./scripts/bump-workspace-minor.sh)"
          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: github.event_name == 'push' || inputs.publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag release
        if: github.event_name == 'push' || inputs.publish
        run: |
          git add Cargo.toml
          git commit -m "release: v${{ steps.bump.outputs.next_version }}"
          git tag "v${{ steps.bump.outputs.next_version }}"

      - name: Publish crates to crates.io
        if: github.event_name == 'push' || inputs.publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
          NEXT_VERSION: ${{ steps.bump.outputs.next_version }}
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CRATES_IO_TOKEN is not configured" >&2
            exit 1
          fi

          crate_published() {
            local crate="$1"
            curl -fsS "https://crates.io/api/v1/crates/${crate}/${NEXT_VERSION}" >/dev/null 2>&1
          }

          wait_for_crate() {
            local crate="$1"
            local attempts=20
            local attempt=1

            while [ "$attempt" -le "$attempts" ]; do
              if crate_published "$crate"; then
                return 0
              fi

              echo "waiting for ${crate} ${NEXT_VERSION} to appear on crates.io (${attempt}/${attempts})"
              attempt=$((attempt + 1))
              sleep 15
            done

            echo "${crate} ${NEXT_VERSION} did not appear on crates.io in time" >&2
            return 1
          }

          release_crate() {
            local crate="$1"
            local attempts=10
            local attempt=1

            if crate_published "$crate"; then
              echo "${crate} ${NEXT_VERSION} already exists on crates.io; skipping"
              wait_for_crate "$crate"
              return 0
            fi

            cargo publish -p "$crate" --locked --dry-run

            while [ "$attempt" -le "$attempts" ]; do
              if cargo publish -p "$crate" --locked; then
                wait_for_crate "$crate"
                return 0
              fi

              if crate_published "$crate"; then
                echo "${crate} ${NEXT_VERSION} became available after publish attempt ${attempt}"
                wait_for_crate "$crate"
                return 0
              fi

              echo "publish attempt ${attempt}/${attempts} for ${crate} failed; waiting for index propagation"
              attempt=$((attempt + 1))
              sleep 20
            done

            echo "failed to publish ${crate} ${NEXT_VERSION}" >&2
            return 1
          }

          release_crate spongefish-derive
          release_crate spongefish
          release_crate spongefish-poseidon2
          release_crate spongefish-circuit
          release_crate spongefish-pow

      - name: Push release commit and tag
        if: github.event_name == 'push' || inputs.publish
        run: |
          git push origin HEAD:main
          git push origin "refs/tags/v${{ steps.bump.outputs.next_version }}"
